{% extends 'base.html' %}
{% block title %}Password Reset Complete{% endblock %}
{% block auth_content %}
<div class="auth-wrapper">
    <div class="auth-card text-center">
        <i class="bi bi-check-circle text-success" style="font-size:3rem;"></i>
        <h3 class="mt-3">Password Reset Complete</h3>
        <p class="text-muted">Your password has been set. You may now log in.</p>
        <a href="{% url 'accounts:login' %}" class="btn btn-vb-primary">Sign In</a>
    </div>
</div>
{% endblock %}
