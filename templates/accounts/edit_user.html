{% extends 'base.html' %}
{% block title %}Edit User{% endblock %}
{% block content %}
<h1 class="page-title">Edit User: {{ user_obj.username }}</h1>
<div class="card-panel">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label">{{ field.label }}</label>
                {{ field }}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-vb-primary">Save Changes</button>
            <a href="{% url 'accounts:manage_users' %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
