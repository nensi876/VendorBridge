{% extends 'base.html' %}
{% block title %}Reset Sent{% endblock %}
{% block auth_content %}
<div class="auth-wrapper">
    <div class="auth-card text-center">
        <i class="bi bi-envelope-check text-success" style="font-size:3rem;"></i>
        <h3 class="mt-3">Check Your Email</h3>
        <p class="text-muted">If an account exists with that email, we've sent password reset instructions.</p>
        <a href="{% url 'accounts:login' %}" class="btn btn-vb-primary">Back to Login</a>
    </div>
</div>
{% endblock %}
