{% extends 'base.html' %}
{% block title %}Forgot Password{% endblock %}
{% block auth_content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">
            <h1><i class="bi bi-key"></i> Forgot Password</h1>
            <p>Enter your email to receive reset instructions</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" required placeholder="you@company.com">
            </div>
            <button type="submit" class="btn btn-vb-primary w-100 mb-3">Send Reset Link</button>
        </form>
        <div class="text-center">
            <a href="{% url 'accounts:login' %}">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
